name: claude_code_mobile
description: Claude Code Mobile - AI-powered coding assistant for remote servers via SSH
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.4
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^7.6.7

  # Functional Programming
  dartz: ^0.10.1

  # SSH Client
  dartssh2: ^2.9.0

  # HTTP Client
  dio: ^5.4.1

  # Local Storage
  sqflite: ^2.3.2
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  path_provider: ^2.1.2
  path: ^1.9.0

  # Code Generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # UI Components
  flutter_markdown: ^0.6.19
  flutter_highlight: ^0.7.0
  google_fonts: ^6.2.0
  flutter_svg: ^2.0.10
  flutter_chat_ui: ^1.6.13
  flutter_chat_types: ^3.6.2
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  rxdart: ^0.27.7
  collection: ^1.18.0
  http: ^1.2.0
  
  # Logging
  logger: ^2.0.2+1
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

  # Code Generation
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1

  # Testing
  bloc_test: ^9.1.6
  mocktail: ^1.0.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
